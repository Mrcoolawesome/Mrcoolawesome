name: GitHub Stats Card Generation

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch: # Allows manual run

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      # Step 1: Generate the Overall Stats Card
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Mrcoolawesome&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      # Step 2: Generate the Languages Card
      - name: Generate Language Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Mrcoolawesome&layout=compact&theme=tokyonight
          path: profile/langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      # Step 3: Use the teoxoy action ONLY to update text in the README if needed
      # Or you can skip this if you just want to manually keep your bio in TEMPLATE.md
      - name: Sync README and Template
        uses: teoxoy/profile-readme-stats@v1.2
        with:
          token: ${{ secrets.STATS_TOKEN }}
          template: ./TEMPLATE.md
          readme: ./README.md

      # Step 4: Push the actual .svg files back to the repo
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update GitHub stats images" || exit 0
          git push https://${{ secrets.STATS_TOKEN }}@github.com/${{ github.repository }}.git
